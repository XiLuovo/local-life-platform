services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-local_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sky_take_out}
      MYSQL_USER: ${MYSQL_USER:-sky}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local_app_password}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sky-server/src/main/resources/db/00-sky_take_out_base.sql:/docker-entrypoint-initdb.d/00-base.sql:ro
      - ./sky-server/src/main/resources/db/sky_take_out_local_life.sql:/docker-entrypoint-initdb.d/10-local-life.sql:ro
      - ./sky-server/src/main/resources/db/sky_take_out_social.sql:/docker-entrypoint-initdb.d/20-social.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-local_redis_password}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sky_take_out}
      MYSQL_USER: ${MYSQL_USER:-sky}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local_app_password}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-local_redis_password}
      SKY_JWT_ADMIN_SECRET: ${SKY_JWT_ADMIN_SECRET:-local-development-admin-secret-please-change}
      SKY_JWT_USER_SECRET: ${SKY_JWT_USER_SECRET:-local-development-user-secret-please-change}
      SKY_AUTH_FIXED_LOGIN_CODE: ${SKY_AUTH_FIXED_LOGIN_CODE:-123456}
      SKY_PAY_MOCK_ENABLED: ${SKY_PAY_MOCK_ENABLED:-false}
      SKY_SECKILL_CONSUMER_NAME: ${SKY_SECKILL_CONSUMER_NAME:-compose-consumer}
      SKY_SECKILL_MAX_RETRIES: ${SKY_SECKILL_MAX_RETRIES:-3}
      SKY_SECKILL_RETRY_DELAY_MS: ${SKY_SECKILL_RETRY_DELAY_MS:-2000}
      SKY_SECKILL_CLAIM_IDLE_MS: ${SKY_SECKILL_CLAIM_IDLE_MS:-30000}
      SKY_SECKILL_BLOCK_TIMEOUT_MS: ${SKY_SECKILL_BLOCK_TIMEOUT_MS:-2000}
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql-data:
  redis-data:
