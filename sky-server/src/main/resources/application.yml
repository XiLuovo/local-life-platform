server:
  port: 8080

management:
  server:
    address: ${SKY_MANAGEMENT_ADDRESS:127.0.0.1}
    port: ${SKY_MANAGEMENT_PORT:8081}
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      enabled: true
      show-details: never
    prometheus:
      enabled: true
  metrics:
    tags:
      application: local-life-platform
    distribution:
      percentiles-histogram:
        "sky.seckill.admission.duration": true
        "sky.seckill.processing.duration": true

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${sky.datasource.driver-class-name}
      url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${sky.datasource.username}
      password: ${sky.datasource.password}
  redis:
    host: ${sky.redis.host}
    port: ${sky.redis.port}
    password: ${sky.redis.password}
    database: ${sky.redis.database}

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: ${SKY_JWT_ADMIN_SECRET}
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    user-secret-key: ${SKY_JWT_USER_SECRET}
    user-ttl: 7200000
    user-token-name: authentication
  alioss:
    endpoint: ${sky.alioss.endpoint}
    access-key-id: ${sky.alioss.access-key-id}
    access-key-secret: ${sky.alioss.access-key-secret}
    bucket-name: ${sky.alioss.bucket-name}
  wechat:
    appid: ${sky.wechat.appid}
    secret: ${sky.wechat.secret}
    mchid : ${sky.wechat.mchid}
    mchSerialNo: ${sky.wechat.mchSerialNo}
    privateKeyFilePath: ${sky.wechat.privateKeyFilePath}
    apiV3Key: ${sky.wechat.apiV3Key}
    weChatPayCertFilePath: ${sky.wechat.weChatPayCertFilePath}
    notifyUrl: ${sky.wechat.notifyUrl}
    refundNotifyUrl: ${sky.wechat.refundNotifyUrl}
  shop:
    address: 北京市海淀区上地十街10号
  pay:
    mock-enabled: ${SKY_PAY_MOCK_ENABLED:false}
  auth:
    # 仅用于本地联调；生产环境保持为空并接入真实短信服务
    fixed-login-code: ${SKY_AUTH_FIXED_LOGIN_CODE:}
  order:
    # 服务端按商品数量计算打包费，客户端提交的金额与打包费不会被信任
    pack-fee-per-item: 0
  seckill:
    consumer-name: ${SKY_SECKILL_CONSUMER_NAME:${HOSTNAME:local}}
    max-retries: ${SKY_SECKILL_MAX_RETRIES:3}
    retry-delay-ms: ${SKY_SECKILL_RETRY_DELAY_MS:2000}
    claim-idle-ms: ${SKY_SECKILL_CLAIM_IDLE_MS:30000}
    block-timeout-ms: ${SKY_SECKILL_BLOCK_TIMEOUT_MS:2000}
    metrics-refresh-ms: ${SKY_SECKILL_METRICS_REFRESH_MS:5000}
  baidu:
    ak: your-ak
